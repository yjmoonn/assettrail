name: Deploy GitHub Pages

on:
  schedule:
    - cron: "30 21 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install price dependencies
        run: pip install -r requirements.txt

      - name: Generate prices
        run: python scripts/generate_prices.py

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir _site
          cp index.html app.js styles.css firebase-config.js prices.json .nojekyll _site/

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
