name: Deploy GitHub Pages

on:
  schedule:
    - cron: "30 21 * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      generate_prices:
        description: "Regenerate prices.json before deploying"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PAGES_URL: https://yjmoonn.github.io/assettrail

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check app.js syntax
        run: npm run check:js

      - name: Run JS tests
        run: |
          npm run test:prices
          npm run test:price-fallback
          npm run test:cloud
          npm run test:cloud-prices

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install price dependencies
        run: pip install -r requirements.txt

      - name: Run price generator tests
        run: npm run test:price-requests

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Determine price mode
        id: price_mode
        shell: bash
        run: |
          set -euo pipefail

          generate="false"
          reason="reuse existing prices.json"

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            generate="true"
            reason="scheduled daily price update"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            generate="${{ inputs.generate_prices }}"
            if [[ "$generate" == "true" ]]; then
              reason="manual price update requested"
            else
              reason="manual deploy without price update"
            fi
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            if [[ "$before" =~ ^0+$ ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$after")"
            else
              changed_files="$(git diff --name-only "$before" "$after")"
            fi

            echo "$changed_files" | sed 's/^/changed: /'
            if echo "$changed_files" | grep -Eq '^(tickers\.json|requirements\.txt|scripts/generate_prices\.py)$'; then
              generate="true"
              reason="price input or generator changed"
            fi
          fi

          echo "generate=$generate" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "Price mode: $reason"

      - name: Set up Python
        if: steps.price_mode.outputs.generate == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install price dependencies
        if: steps.price_mode.outputs.generate == 'true'
        run: pip install -r requirements.txt

      - name: Generate prices
        if: steps.price_mode.outputs.generate == 'true'
        run: python scripts/generate_prices.py

      - name: Reuse deployed prices
        if: steps.price_mode.outputs.generate != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if ! curl -fsSL "$PAGES_URL/prices.json?v=${{ github.sha }}" -o prices.json; then
            cat > prices.json <<'JSON'
          {
            "errors": [
              {
                "error": "deployed prices.json could not be reused",
                "ticker": "prices.json",
                "type": "DEPLOY"
              }
            ],
            "fx": {},
            "generatedAt": null,
            "prices": {
              "KRX": {},
              "US": {}
            },
            "symbols": {
              "KRX": {},
              "US": {}
            }
          }
          JSON
          fi

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir _site
          cp index.html app.js styles.css assettrail-tokens.css firebase-config.js prices.json .nojekyll _site/

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
